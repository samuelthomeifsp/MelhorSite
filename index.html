<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Site Muito Bom 3000</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="margin">
    <div class="regras">
      <h1 style="margin-left: 30px">Site Muito Bom 3000</h1>
      <ol type="I">
        <li>Não pode jogar lixo no chão.</li>
        <li>Não pode bater no amiginho.</li>
        <li>PODE farmar aura!</li>
        <li>PODE fazer o six seven!</li>
        <li>Eu vou farmar aura na escola.</li>
        <li>
          <h3 style="padding-left: 20px;">Sempre lembrar dos 4Rs.</h3>
          <ol type="I">
            <li>Reforma</li>
            <li>Revolução</li>
            <li>Restruturação</li>
            <li>Radical</li>
          </ol>
        </li>
        <li>Boa tarde.</li>
      </ol>
    </div>
    <br>
    <div class="form">
      <form action="./main.html" method="get" enctype="multipart/form-data">
        <div class="innie">
          <label class="small-label">Nome</label>
          <input type="text" name="name" placeholder="Nome" required>
        </div>
        <div class="innie">
          <label class="small-label">E-mail</label>
          <input type="email" name="email" placeholder="E-mail" required>
        </div>
        <div class="innie">
          <label class="small-label">Senha</label>
          <input type="password" name="password" placeholder="Senha" required>
        </div>
        <div class="innie">
          <label class="small-label">Foto</label>
          <input type="file" id="image-upload" name="pfp" accept="image/*">
          <img id="image-preview" width="300" style="margin-left: 10px;">
        </div>
        <div class="innie">
          <label>Concorda com os termos?</label>
          <input type="checkbox" class="checkbox">
        </div>
        <br>
        <br>
        <div class="innie">
          <input type="submit" style="width: 98%;" value="Envia pra nóis">
        </div>
      </form>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
